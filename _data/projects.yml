- name: libpam-pwdfile-rs
  descr: A Linux Pluggable Authentication Module (PAM) written in Rust that allows users to use multiple passwords for a single account. Packaged for Arch Linux via the AUR.
  demo: https://github.com/Supernovatux/libpam-pwdfile-rs
  tags:
    - tag: Rust
    - tag: Linux
    - tag: PAM

- name: Openloop Control of Soft Continuum Robot
  descr: Used deep learning to predict the end effector pose of a 3D-printed continuum robot without any feedback. The model was accurate to 5 mm.
  tags:
    - tag: Python
    - tag: PyTorch
    - tag: C++
    - tag: OpenCV

- name: A Bytecode VM for Lox in Linux kernel
  descr: I implemented a Bytecode VM for Lox programing language as a Linux kernel Module.
  demo: https://github.com/Supernovatux/kmod_lox
  tags:
    - tag: Linux
    - tag: C

- name: Pick and Place Robot
  descr: "I designed the control systems for a pick and place robot we made for the Flipkart GRid Hackathon. We were ranked 66 across the country"
  tags:
